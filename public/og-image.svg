<svg viewBox="0 0 1200 630" width="1200" height="630" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#030303"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="0.78" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#39ff14" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#39ff14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="purpleGlow" cx="0.1" cy="0.95" r="0.45">
      <stop offset="0%" stop-color="#9945ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#9945ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horn" x1="0" y1="1" x2="0.6" y2="0">
      <stop offset="0%" stop-color="#00b140"/>
      <stop offset="55%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#14f195"/>
    </linearGradient>
    <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#232323"/>
      <stop offset="45%" stop-color="#121212"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#39ff14"/>
      <stop offset="100%" stop-color="#14f195"/>
    </linearGradient>
    <filter id="glowG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowR" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#greenGlow)"/>
  <rect width="1200" height="630" fill="url(#purpleGlow)"/>

  <!-- Faint candlesticks -->
  <g opacity="0.12">
    <g stroke="#39ff14" fill="#39ff14">
      <line x1="80" y1="470" x2="80" y2="590" stroke-width="3"/><rect x="68" y="500" width="24" height="60" rx="4"/>
      <line x1="150" y1="440" x2="150" y2="580" stroke-width="3"/><rect x="138" y="470" width="24" height="70" rx="4"/>
      <line x1="290" y1="450" x2="290" y2="585" stroke-width="3"/><rect x="278" y="480" width="24" height="72" rx="4"/>
      <line x1="360" y1="415" x2="360" y2="545" stroke-width="3"/><rect x="348" y="445" width="24" height="66" rx="4"/>
    </g>
    <g stroke="#ff1e1e" fill="#ff1e1e">
      <line x1="220" y1="465" x2="220" y2="595" stroke-width="3"/><rect x="208" y="495" width="24" height="58" rx="4"/>
      <line x1="430" y1="435" x2="430" y2="560" stroke-width="3"/><rect x="418" y="462" width="24" height="60" rx="4"/>
    </g>
  </g>

  <!-- Bull (right side), scaled from brand mark -->
  <g transform="translate(700,60) scale(2.5)">
    <g filter="url(#glowG)">
      <path d="M74 90 C50 86 32 68 24 32 C23 25 27 22 31 28 C42 54 55 72 82 79 C87 81 85 88 79 90 Z" fill="url(#horn)"/>
      <path d="M126 90 C150 86 168 68 176 32 C177 25 173 22 169 28 C158 54 145 72 118 79 C113 81 115 88 121 90 Z" fill="url(#horn)"/>
    </g>
    <path d="M62 92 L42 84 L64 106 Z" fill="#0c0c0c"/>
    <path d="M138 92 L158 84 L136 106 Z" fill="#0c0c0c"/>
    <path d="M68 74 L100 66 L132 74 L148 98 L138 124 L120 162 L108 174 L92 174 L80 162 L62 124 L52 98 Z" fill="url(#head)" stroke="rgba(57,255,20,0.25)" stroke-width="1.4"/>
    <path d="M88 68 L100 80 L112 68 L100 62 Z" fill="#0a0a0a"/>
    <g filter="url(#glowR)">
      <path d="M72 104 L90 100 L88 110 L74 111 Z" fill="#ff1e1e"/>
      <path d="M128 104 L110 100 L112 110 L126 111 Z" fill="#ff1e1e"/>
    </g>
    <path d="M84 148 L100 142 L116 148 L110 166 L100 170 L90 166 Z" fill="#0a0a0a"/>
    <ellipse cx="92" cy="156" rx="3.4" ry="4.6" fill="#030303"/>
    <ellipse cx="108" cy="156" rx="3.4" ry="4.6" fill="#030303"/>
  </g>

  <!-- Text -->
  <text x="80" y="215" fill="#f5f5f5" font-size="44" font-weight="bold" letter-spacing="6">BULL</text>
  <text x="80" y="295" fill="url(#titleGrad)" font-size="86" font-weight="bold" letter-spacing="2">HORN</text>
  <text x="80" y="360" fill="#e5e5e5" font-size="30" font-weight="bold">Real stories. Real wallets. Real people.</text>
  <text x="80" y="410" fill="#a1a1aa" font-size="22">A community-powered giving board built</text>
  <text x="80" y="442" fill="#a1a1aa" font-size="22">for the Black Bull movement.</text>
  <text x="80" y="560" fill="#52525b" font-size="19" letter-spacing="1">COMMUNITY-BUILT. NO CLAIMS. NO CUSTODY.</text>
</svg>
